# CommerceCore — Week 1 infrastructure
# Brings up all 3 datastores + both services + the NGINX gateway.
# Run: docker compose up --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: commercecore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - commercecore-net

  mongo:
    image: mongo:7
    container_name: commercecore-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - commercecore-net

  redis:
    image: redis:7-alpine
    container_name: commercecore-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - commercecore-net

  catalog-cart-service:
    build:
      context: ./services/catalog-cart-service
    container_name: commercecore-catalog-cart-service
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: ${CATALOG_SERVICE_PORT}
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      CART_TTL_SECONDS: ${CART_TTL_SECONDS:-604800}
    ports:
      - "${CATALOG_SERVICE_PORT}:4000"
    networks:
      - commercecore-net

  order-payment-service:
    build:
      context: ./services/order-payment-service
    container_name: commercecore-order-payment-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY_MS: ${JWT_ACCESS_EXPIRY_MS}
      JWT_REFRESH_EXPIRY_MS: ${JWT_REFRESH_EXPIRY_MS}
      CATALOG_SERVICE_URL: http://catalog-cart-service:4000
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      SERVER_PORT: 8080
    ports:
      - "${ORDER_SERVICE_PORT}:8080"
    networks:
      - commercecore-net

  gateway:
    image: nginx:1.27-alpine
    container_name: commercecore-gateway
    restart: unless-stopped
    depends_on:
      - catalog-cart-service
      - order-payment-service
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${GATEWAY_PORT}:8081"
    networks:
      - commercecore-net

networks:
  commercecore-net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
