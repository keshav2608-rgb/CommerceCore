# CommerceCore API Gateway
# Routes:
#   /auth/**, /orders/**, /payments/**  -> order-payment-service (Spring Boot)
#   /products/**, /cart/**              -> catalog-cart-service (Node/TS)
# Also applies a basic rate limit per client IP (Section 25 security plan).

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # 10 requests/sec per IP with a small burst — tune later once real traffic is observed.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream catalog_cart_service {
        server catalog-cart-service:4000;
    }

    upstream order_payment_service {
        server order-payment-service:8080;
    }

    server {
        listen 8081;
        server_name _;

        limit_req zone=api_limit burst=20 nodelay;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # ---- Node.js catalog + cart service ----
        location /products {
            proxy_pass http://catalog_cart_service;
        }

        location /cart {
            proxy_pass http://catalog_cart_service;
        }

        location /catalog-health {
            proxy_pass http://catalog_cart_service/health;
        }

        # ---- Spring Boot order + payment service ----
        location /auth {
            proxy_pass http://order_payment_service;
        }

        location /orders {
            proxy_pass http://order_payment_service;
        }

        location /payments {
            proxy_pass http://order_payment_service;
        }

        location /order-health {
            proxy_pass http://order_payment_service/health;
        }

        # Gateway's own liveness check
        location /gateway-health {
            default_type application/json;
            return 200 '{"status":"UP","service":"nginx-gateway"}';
        }
    }
}
